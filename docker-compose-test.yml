services:
  floci:
    container_name: "floci_test"
    image: hectorvent/floci:latest
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      - FLOCI_HOSTNAME=floci
      - FLOCI_SERVICES_DOCKER_NETWORK=${COMPOSE_PROJECT_NAME:-tibber-aws}_default
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./volume/floci-data:/app/data"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/ || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 5s