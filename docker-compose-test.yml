services:
  floci:
    container_name: floci_test
    image: hectorvent/floci:latest
    ports:
      - "4566:4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    environment:
      - FLOCI_HOSTNAME=floci
      - FLOCI_SERVICES_DOCKER_NETWORK=${COMPOSE_PROJECT_NAME:-tibber-aws}_default
  create-resources:
    restart: "no"
    image: amazon/aws-cli:2.11.0
    depends_on:
      floci:
        condition: service_healthy
    environment:
      - AWS_DEFAULT_REGION=eu-west-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - ./:/app
    entrypoint: [ "sh", "-c" ]
    command:
    - |
        aws --endpoint-url=http://floci:4566 secretsmanager create-secret --name my-secret --secret-string '{"PG_PASSWORD":"stacy"}'
        cd /app/test/lambda
        aws --endpoint-url=http://floci:4566 lambda create-function --function-name localstack-lambda-url-example \
         --runtime nodejs18.x --zip-file fileb://function.zip --handler index.handler \
          --role arn:aws:iam::000000000000:role/lambda-role --timeout 30
        echo "Done creating test resources"