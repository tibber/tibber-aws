version: 2.1
workflows:
  build_and_deploy:
    jobs:
      - build
      - deploy:
          requires:
            - build
          context:
            - GITHUB
          filters:
            branches:
              only:
                - master
                - main
jobs:
  build:
    working_directory: ~/package
    machine:
      image: ubuntu-2204:2025.09.1
    steps:
      - checkout
      - run:
          name: Start Floci and create test resources
          command: |
            mkdir -p volume/floci-data
            docker compose -f docker-compose-test.yml up -d
            echo "Waiting for Floci to be healthy..."
            for i in $(seq 1 60); do
              status=$(docker inspect --format='{{.State.Health.Status}}' floci_test 2>/dev/null || echo "starting")
              if [ "$status" = "healthy" ]; then
                echo "Floci is healthy"
                break
              fi
              sleep 2
            done
      - run:
          name: Test Package
          environment:
            AWS_REGION: eu-west-1
            AWS_ACCESS_KEY_ID: test
            AWS_SECRET_ACCESS_KEY: test
            AWS_ENDPOINT_URL: http://localhost:4566
          command: |
            node --version
            yarn
            yarn test
      - run:
          name: Floci logs (on failure)
          when: on_fail
          command: |
            docker ps -a
            docker logs floci_test || true
  deploy:
    working_directory: ~/package
    machine:
      image: ubuntu-2204:2025.09.1
    steps:
      - checkout
      - run:
          name: Deploy Package
          command: |
            export GH_TOKEN=$GITHUB_AUTH_TOKEN
            export NPM_TOKEN=$CIRCLE_OIDC_TOKEN_V2
            yarn
            yarn release
